# Runs on every push and pull request. Two parallel jobs — backend
# (pytest + ruff) and frontend (tsc + eslint). Keep this fast and
# deterministic; integration tests can be added as separate workflows.
name: CI

on:
  push:
  pull_request:

# Cancel an in-progress run when a newer commit lands on the same branch /
# PR. Saves CI minutes on rapid push sequences without losing the latest
# result.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest + ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      # Pinned to majors that ship Node 24 — older majors trigger
      # GitHub's Node-20-deprecation advisory in CI logs.
      - uses: actions/checkout@v6

      # uv handles Python install + dependency resolution. Cache on by default
      # speeds repeat runs ~3× by reusing the resolver / wheel cache. Tagged
      # to an immutable version because astral-sh stopped publishing the
      # moving `@v8` tag (see setup-uv v8.0.0 release notes).
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "backend/pyproject.toml"

      # No uv.lock in the repo yet — `uv sync` resolves fresh each run. If
      # version drift becomes a problem, commit a lockfile and switch to
      # `uv sync --frozen`. The `dev` group (pytest) is included by default.
      - name: Sync dependencies
        run: uv sync

      # Lint via uvx — runs the latest ruff without committing it as a
      # backend dep.
      - name: Lint (ruff)
        run: uvx ruff check .

      - name: Run tests
        run: uv run pytest tests/ -v

  frontend:
    name: Frontend (typecheck + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          # Node 22 LTS — Next.js 16 requires >= 18.18; 22 matches Vercel's
          # current default and the dev environment.
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # No build step here — Vercel does that on deploy, and a build would
      # fail on missing NEXT_PUBLIC_* env vars CI doesn't have. tsc --noEmit
      # catches type regressions without that requirement.
      - name: Typecheck
        run: npx tsc --noEmit

      # ESLint config gates only on errors, not warnings — see
      # eslint.config.mjs for the rule overrides. Existing warnings
      # surface in the lint output as a triage backlog without blocking CI.
      - name: Lint (eslint)
        run: npm run lint

  # Stack-up smoke. Spins minimal Postgres + PostgREST as GitHub Actions
  # service containers, applies every migration via psql, boots uvicorn
  # against PostgREST, and hits every safe read endpoint. Catches the
  # "backend code expects schema/data prod doesn't have" class of bug
  # BEFORE merge — i.e. what shipped on 2026-05-29 when the new
  # `gurufocus_lookup_failed_at` / `out_of_scope_*` columns in
  # companies.py's SELECT 500'd in prod for hours.
  #
  # Why services and not `supabase start`: the full Supabase CLI brings
  # up ~10 containers (postgres, postgrest, gotrue, realtime, storage,
  # imgproxy, edge-runtime, studio, inbucket, vector, pooler). The
  # backend's smoke endpoints only need postgres + postgrest, so we skip
  # the rest. Cold-cache runtime drops from ~3-4 min to ~60-90s.
  #
  # Auth shim: a few migrations reference `auth.users` and
  # `extensions.digest` (a Supabase convention — pgcrypto lives in the
  # `extensions` schema). The bootstrap step creates both before
  # migrations apply, so the migrations are byte-identical to prod's.
  #
  # Skip the job by pushing with `[skip stack-smoke]` in the commit subject.
  backend-stack-smoke:
    name: Backend stack smoke (Postgres + PostgREST + uvicorn)
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip stack-smoke]')"
    timeout-minutes: 8

    services:
      # postgres:17-alpine matches Supabase's pinned major version
      # (supabase/config.toml: major_version = 17). Alpine variant is
      # ~85MB vs ~150MB for postgres:17.
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 54322:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

      # PostgREST translates the REST calls the backend's Supabase
      # client makes into SQL. JWT secret matches Supabase's default
      # demo secret so the well-known service_role JWT (used below)
      # validates here.
      postgrest:
        image: postgrest/postgrest:v12.2.0
        env:
          PGRST_DB_URI: postgres://postgres:postgres@postgres:5432/postgres
          PGRST_DB_ANON_ROLE: anon
          PGRST_DB_SCHEMAS: public
          PGRST_JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long
          PGRST_DB_USE_LEGACY_GUCS: "false"
        ports:
          - 54321:3000

    env:
      # Well-known Supabase demo service_role JWT — signed with the secret
      # above, role=service_role, no expiry concern (exp far in the
      # future). Same key `supabase status -o env` prints locally. Public
      # because the JWT secret is also public; only meaningful inside this
      # CI's isolated network.
      SUPABASE_DEMO_SERVICE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU

    steps:
      - uses: actions/checkout@v6

      - name: Install postgres-client (psql)
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      # Bootstrap the bits a Supabase-flavored DB has by default but a
      # bare postgres image does not: the three Supabase roles, the
      # `extensions` schema with pgcrypto (so `extensions.digest(...)`
      # resolves), and a minimal `auth.users` shim so the
      # admin_email_hash migration's UPDATE statement runs against an
      # empty table instead of erroring out.
      - name: Bootstrap Supabase-shaped DB
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -p 54322 -U postgres -v ON_ERROR_STOP=1 <<'SQL'
          -- Roles referenced by every Supabase migration (GRANTs etc).
          -- service_role needs BYPASSRLS so the deny-all RLS policies in
          -- 20260522030000 don't lock us out via PostgREST.
          DO $$ BEGIN
            CREATE ROLE anon NOLOGIN;
          EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          DO $$ BEGIN
            CREATE ROLE authenticated NOLOGIN;
          EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          DO $$ BEGIN
            CREATE ROLE service_role NOLOGIN BYPASSRLS;
          EXCEPTION WHEN duplicate_object THEN NULL; END $$;

          -- pgcrypto in the `extensions` schema — Supabase convention,
          -- referenced by the admin-email trigger as `extensions.digest(...)`.
          CREATE SCHEMA IF NOT EXISTS extensions;
          CREATE EXTENSION IF NOT EXISTS pgcrypto SCHEMA extensions;

          -- Minimal auth.users — three columns the
          -- admin_email_hash migration's UPDATE touches. Empty in CI,
          -- so the UPDATE no-ops.
          CREATE SCHEMA IF NOT EXISTS auth;
          CREATE TABLE IF NOT EXISTS auth.users (
            id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
            email text,
            raw_app_meta_data jsonb DEFAULT '{}'::jsonb
          );
          SQL

      - name: Apply migrations
        env:
          PGPASSWORD: postgres
        run: |
          set -e
          for f in supabase/migrations/*.sql; do
            echo "Applying $(basename "$f")"
            psql -h localhost -p 54322 -U postgres -v ON_ERROR_STOP=1 -f "$f"
          done
          # Make sure PostgREST picks up the new schema even if a
          # migration didn't NOTIFY itself.
          psql -h localhost -p 54322 -U postgres -c "NOTIFY pgrst, 'reload schema'"

      - name: Wait for PostgREST to reload schema
        run: |
          # Probe the OpenAPI doc — succeeds only after PostgREST has
          # picked up the migrated schema. The post-NOTIFY reload is
          # async; usually <1s but give it a few seconds of headroom.
          for i in $(seq 1 15); do
            if curl -sS -m 3 -o /dev/null -w "%{http_code}" http://localhost:54321/ | grep -q "^200$"; then
              echo "PostgREST ready (${i}s)"
              exit 0
            fi
            sleep 1
          done
          echo "::error::PostgREST never reported ready"
          exit 1

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "backend/pyproject.toml"

      - name: Sync backend deps
        working-directory: backend
        run: uv sync

      # Boot uvicorn in the background. SUPABASE_URL points at the
      # PostgREST service-container port. DISABLE_SCHEDULER=1 stops the
      # APScheduler from firing weekly/monthly jobs inside CI.
      - name: Start backend
        working-directory: backend
        env:
          SUPABASE_URL: http://localhost:54321
          SUPABASE_SERVICE_KEY: ${{ env.SUPABASE_DEMO_SERVICE_KEY }}
          DISABLE_SCHEDULER: "1"
        run: |
          nohup uv run uvicorn main:app --host 127.0.0.1 --port 8000 \
            > backend.log 2>&1 &
          echo $! > backend.pid

      - name: Wait for /api/health (max 60s)
        run: |
          for i in $(seq 1 60); do
            if curl -sS -m 5 http://127.0.0.1:8000/api/health >/dev/null 2>&1; then
              echo "Backend ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Backend never became healthy. Logs:"
          tail -200 backend/backend.log || true
          exit 1

      # Probe every safe GET endpoint. The list deliberately excludes:
      #   * path-param endpoints needing fixture data (e.g. /companies/{id}, /earnings/{cid}/...)
      #   * admin-gated endpoints (require an admin JWT — not in scope here)
      #   * AIRS Playwright endpoints (need broker creds)
      #   * Leonteq endpoints (external API, flaky for CI)
      # Add new endpoints here when adding routers. Any non-2xx fails CI.
      - name: Probe safe read endpoints
        run: |
          set -u
          BACKEND=http://127.0.0.1:8000
          ENDPOINTS=(
            /api/health
            /api/hello
            /api/items
            /api/usage
            /api/data/latest-price-date
            /api/companies
            /api/companies/field-options
            /api/companies/memberships
            /api/companies/check-duplicates
            /api/longequity/snapshots
            /api/longequity/latest-available
            /api/momentum/signals
            /api/momentum/backtests
            /api/momentum/current-picks
            /api/universe-templates
            /api/universe/labels
            /api/universe/months
            /api/universe/criteria
            /api/universe/derived-metrics/criteria
            /api/universe/derived-metrics/status
            /api/index-universe/indexes
            /api/index-universe/months
            /api/index-universe/cumulative
            /api/index-universe/changes
            /api/benchmarks
            /api/fx/coverage
            /api/fx/latest
            /api/exchange-fees
            /api/scheduled-strategies
            /api/scheduled-strategies/held-companies
            /api/ingest/runs
            /api/gurufocus/exchanges
            /api/gurufocus/exchange-currencies
            /api/acwi/xls-age
            /api/acwi/holdings
            /api/acwi/announcements
            /api/acwi/net-additions
          )

          fail=0
          for path in "${ENDPOINTS[@]}"; do
            status=$(curl -sS -o /tmp/body -w "%{http_code}" -m 60 \
              "$BACKEND$path" || echo "000")
            if [[ "$status" =~ ^2[0-9][0-9]$ ]]; then
              printf "OK   %s  %s\n" "$status" "$path"
            else
              printf "FAIL %s  %s\n" "$status" "$path"
              echo "  body (first 500 bytes):"
              head -c 500 /tmp/body | sed 's/^/    /'
              echo
              fail=1
            fi
          done

          if [[ $fail -ne 0 ]]; then
            echo "::error::One or more endpoints returned non-2xx. See lines above."
            exit 1
          fi

      - name: Backend logs (on failure)
        if: failure()
        run: tail -300 backend/backend.log || true

      # Service containers are torn down automatically when the job
      # ends; the backend process dies with the runner. The kill step
      # below is cheap insurance for `if: always()` log inspection
      # paths that might fire before the runner shuts down.
      - name: Stop backend
        if: always()
        run: |
          [[ -f backend/backend.pid ]] && kill "$(cat backend/backend.pid)" 2>/dev/null || true
