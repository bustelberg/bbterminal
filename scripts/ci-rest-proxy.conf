# nginx config for the CI backend-stack-smoke proxy.
#
# The backend's supabase-py client addresses PostgREST as
# {SUPABASE_URL}/rest/v1/* — in real Supabase that path is routed to
# PostgREST by the Kong API gateway. Our lightweight CI stack runs bare
# PostgREST (which serves at root), so without this shim every backend
# query would hit /rest/v1/* → 404 and surface as a 500. This strips the
# /rest/v1/ prefix and forwards to PostgREST, emulating the gateway.
#
# It also stubs GoTrue's `/auth/v1/user` (CI has no auth server) with a
# canned ADMIN user, so admin-gated mutations like POST /api/momentum/
# backtest can be exercised. CI-only and isolated — it trusts any bearer
# token as admin, which is exactly what we want for the smoke test.
#
# Run with `--network host`: nginx listens on :54320 and forwards to the
# PostgREST service container published on host :54321.
events {}
http {
  server {
    listen 54320;
    location = /auth/v1/user {
      default_type application/json;
      return 200 '{"id":"00000000-0000-0000-0000-000000000001","aud":"authenticated","app_metadata":{"role":"admin"},"user_metadata":{},"created_at":"2026-01-01T00:00:00+00:00","email":"ci-admin@example.test","role":"authenticated"}';
    }
    location /rest/v1/ { proxy_pass http://127.0.0.1:54321/; }
    location /         { proxy_pass http://127.0.0.1:54321/; }
  }
}
